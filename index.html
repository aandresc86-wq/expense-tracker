<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Personal Finance Analytics App</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">

    <header>
      <h1>Personal Finance Analytics App</h1>
      <p>Track, analyze and understand your monthly expenses.</p>
    </header>

    <!-- AUTH SECTION -->
    <section class="card" id="auth-section">
      <h2>Login / Sign Up</h2>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />

      <div class="button-row">
        <button onclick="signUp()">Sign Up</button>
        <button onclick="signIn()">Login</button>
      </div>

      <p id="auth-message"></p>
    </section>

    <!-- APP SECTION -->
    <section id="app-section" style="display: none;">

      <section class="card user-card">
        <div>
          <h2>Welcome</h2>
          <p id="user-email"></p>
        </div>

        <button class="secondary" onclick="signOut()">Logout</button>
      </section>

      <!-- KPI DASHBOARD -->
      <section class="dashboard-grid">

        <div class="kpi-card">
          <h3>Total Expenses</h3>
          <p id="total-expenses">$0</p>
        </div>

        <div class="kpi-card">
          <h3>Number of Expenses</h3>
          <p id="expense-count">0</p>
        </div>

        <div class="kpi-card">
          <h3>Top Category</h3>
          <p id="top-category">-</p>
        </div>

      </section>


</section>

      <!-- MONTH FILTER -->
      <section class="card">
        <h2>Monthly Filter</h2>
      
        <label for="month-filter">Select month:</label>
        <input type="month" id="month-filter" onchange="applyMonthlyFilter()" />
      
        <button class="secondary" onclick="clearMonthlyFilter()">Clear Filter</button>
      </section>

      <!-- ADD EXPENSE -->
      <section class="card">

        <h2>Add Expense</h2>

        <input type="date" id="date" />
        <input type="number" id="amount" placeholder="Amount" />
        <!--<input type="text" id="category" placeholder="Category" />-->
        <select id="category">
          <option value="">Select category...</option>
        
          <option value="Bodycare">Bodycare</option>
          <option value="Butcher">Butcher</option>
          <option value="Clothes">Clothes</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Gasoline">Gasoline</option>
          <option value="Greengrocery">Greengrocery</option>
          <option value="Home">Home</option>
          <option value="Investment">Investment</option>
          <option value="Medical">Medical</option>
          <option value="Others">Others</option>
          <option value="Pets">Pets</option>
          <option value="Services">Services</option>
          <option value="Super">Super</option>
          <option value="Training">Training</option>
          <option value="Car">Car</option>
        </select>
        
        <input type="text" id="description" placeholder="Description" />

        <button onclick="addExpense()">Add Expense</button>
      </section>



      <!-- DOUGHNUT CHART -->
      <section class="card">
        <h2>Expenses by Category (%)</h2>
        <canvas id="categoryChart"></canvas>
      </section>
      
      <!-- HORIZONTAL BAR CHART -->
      <section class="card">
        <h2>Expenses by Category - Ranking</h2>
        <canvas id="categoryBarChart"></canvas>
      </section>

      

      <!-- EXPENSE LIST -->
      <section class="card">
        <h2>Expense History</h2>
        <ul id="expense-list"></ul>
      </section>

    </section>

  </div>

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
  <!-- Chart.js Data Labels Plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  
  <!-- App JS -->
  <script src="app.js"></script>


</body>
</html>
